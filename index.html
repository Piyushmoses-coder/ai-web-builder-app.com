<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS AI — Build Anything with AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=Syne:wght@400;600;800&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #020408;
  --bg2: #060d14;
  --surface: #0a1628;
  --surface2: #0f1f35;
  --border: rgba(0,255,200,0.12);
  --cyan: #00ffc8;
  --violet: #8b5cf6;
  --pink: #f472b6;
  --gold: #f59e0b;
  --white: #f0f6ff;
  --muted: #4a6a8a;
  --text: #c8dff0;
  --glow-c: rgba(0,255,200,0.3);
  --glow-v: rgba(139,92,246,0.3);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Syne',sans-serif;
  overflow-x:hidden;
  cursor:none;
}

/* CUSTOM CURSOR */
#cursor{
  position:fixed;width:12px;height:12px;
  background:var(--cyan);border-radius:50%;
  pointer-events:none;z-index:99999;
  transition:transform 0.1s;mix-blend-mode:difference;
}
#cursor-ring{
  position:fixed;width:36px;height:36px;
  border:1px solid var(--cyan);border-radius:50%;
  pointer-events:none;z-index:99998;opacity:0.5;
  transition:all 0.15s ease;
}

/* CANVAS BG */
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.6;}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  padding:20px 60px;
  display:flex;align-items:center;justify-content:space-between;
  backdrop-filter:blur(20px);
  background:rgba(2,4,8,0.7);
  border-bottom:1px solid var(--border);
}
.nav-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;letter-spacing:3px;
  background:linear-gradient(90deg,var(--cyan),var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.nav-links{display:flex;gap:36px;list-style:none;}
.nav-links a{
  color:var(--muted);text-decoration:none;
  font-size:13px;letter-spacing:1px;text-transform:uppercase;
  transition:color 0.2s;font-family:'Space Mono',monospace;
}
.nav-links a:hover{color:var(--cyan);}
.nav-cta{
  background:transparent;border:1px solid var(--cyan);
  color:var(--cyan);padding:10px 24px;border-radius:4px;
  font-family:'Space Mono',monospace;font-size:12px;letter-spacing:1px;
  cursor:none;transition:all 0.2s;text-transform:uppercase;
}
.nav-cta:hover{background:var(--cyan);color:var(--bg);box-shadow:0 0 20px var(--glow-c);}

/* HERO */
#hero{
  position:relative;z-index:10;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:120px 40px 60px;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(0,255,200,0.08);border:1px solid rgba(0,255,200,0.2);
  padding:8px 18px;border-radius:100px;
  font-family:'Space Mono',monospace;font-size:11px;
  color:var(--cyan);letter-spacing:1px;margin-bottom:32px;
  animation:fadeUp 0.8s ease both;
}
.hero-badge span{width:6px;height:6px;background:var(--cyan);border-radius:50%;animation:pulse 1.5s infinite;}
.hero-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(70px,12vw,160px);
  line-height:0.9;letter-spacing:2px;
  color:var(--white);
  animation:fadeUp 0.8s 0.1s ease both;
  position:relative;
}
.hero-title .accent{
  background:linear-gradient(135deg,var(--cyan),var(--violet),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  display:block;
}
.hero-sub{
  font-size:18px;color:var(--muted);
  max-width:560px;line-height:1.7;margin:24px auto;
  animation:fadeUp 0.8s 0.2s ease both;
  font-family:'Syne',sans-serif;font-weight:400;
}
.hero-btns{
  display:flex;gap:16px;justify-content:center;flex-wrap:wrap;
  animation:fadeUp 0.8s 0.3s ease both;margin-top:8px;
}
.btn-primary{
  background:var(--cyan);color:var(--bg);
  padding:16px 40px;border-radius:4px;border:none;
  font-family:'Space Mono',monospace;font-size:13px;
  font-weight:700;letter-spacing:1px;cursor:none;
  transition:all 0.2s;text-decoration:none;
  box-shadow:0 0 30px var(--glow-c);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 50px var(--glow-c);}
.btn-secondary{
  background:transparent;color:var(--white);
  padding:16px 40px;border-radius:4px;
  border:1px solid rgba(255,255,255,0.15);
  font-family:'Space Mono',monospace;font-size:13px;
  cursor:none;transition:all 0.2s;text-decoration:none;
}
.btn-secondary:hover{border-color:var(--violet);color:var(--violet);}

/* TICKER */
.ticker{
  position:relative;z-index:10;
  background:rgba(0,255,200,0.04);
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  padding:14px 0;overflow:hidden;
}
.ticker-inner{
  display:flex;gap:60px;
  animation:ticker 20s linear infinite;white-space:nowrap;
}
.ticker-item{
  display:flex;align-items:center;gap:10px;
  font-family:'Space Mono',monospace;font-size:11px;
  color:var(--muted);letter-spacing:2px;text-transform:uppercase;
  flex-shrink:0;
}
.ticker-dot{color:var(--cyan);}

/* DEMO SECTION */
#demo{
  position:relative;z-index:10;
  padding:100px 60px;
}
.section-label{
  font-family:'Space Mono',monospace;font-size:11px;
  color:var(--cyan);letter-spacing:3px;text-transform:uppercase;
  margin-bottom:16px;
}
.section-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(48px,6vw,80px);
  color:var(--white);letter-spacing:1px;
  line-height:1;margin-bottom:16px;
}
.section-sub{font-size:16px;color:var(--muted);max-width:500px;line-height:1.7;}

/* IDE DEMO */
.ide-demo{
  margin-top:60px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 0 80px rgba(0,0,0,0.8),0 0 40px rgba(0,255,200,0.05);
}
.ide-topbar{
  background:var(--surface2);
  padding:12px 20px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.ide-dots{display:flex;gap:8px;}
.ide-dot{width:12px;height:12px;border-radius:50%;}
.ide-dot:nth-child(1){background:#ff5f57;}
.ide-dot:nth-child(2){background:#febc2e;}
.ide-dot:nth-child(3){background:#28c840;}
.ide-tabs{display:flex;gap:0;}
.ide-tab{
  padding:6px 20px;font-family:'Space Mono',monospace;font-size:11px;
  color:var(--muted);border-right:1px solid var(--border);cursor:none;
  transition:all 0.2s;
}
.ide-tab.active{color:var(--cyan);background:rgba(0,255,200,0.05);}
.ide-body{display:grid;grid-template-columns:1fr 1fr;height:480px;}
.ide-code{
  padding:28px;font-family:'JetBrains Mono',monospace;font-size:13px;
  line-height:1.8;overflow:hidden;border-right:1px solid var(--border);
  position:relative;
}
.ide-code::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--cyan),var(--violet));
}
.code-line{display:block;animation:fadeCode 0.3s ease both;}
.kw{color:#ff7b72;} .fn{color:#d2a8ff;} .str{color:#a5d6ff;}
.num{color:#f2cc60;} .cm{color:#6a737d;font-style:italic;} .tag{color:#7ee787;}
.ide-preview{
  background:linear-gradient(135deg,#0d1b2a,#0a1628);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.preview-card{
  width:280px;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);border-radius:16px;
  padding:28px;box-shadow:0 20px 60px rgba(0,0,0,0.5);
  transform:rotate(-1deg);
}
.preview-head{
  width:100%;height:8px;background:linear-gradient(90deg,var(--cyan),var(--violet));
  border-radius:4px;margin-bottom:20px;
}
.preview-line{
  height:10px;background:rgba(255,255,255,0.07);
  border-radius:3px;margin-bottom:10px;
}
.preview-line:nth-child(2){width:80%;}
.preview-line:nth-child(3){width:65%;}
.preview-line:nth-child(4){width:90%;}
.preview-btns{display:flex;gap:8px;margin-top:20px;}
.preview-btn{
  flex:1;height:32px;border-radius:6px;
  background:var(--cyan);opacity:0.9;
}
.preview-btn:last-child{background:rgba(255,255,255,0.08);}
.typing-cursor{
  display:inline-block;width:2px;height:14px;
  background:var(--cyan);animation:blink 1s infinite;vertical-align:middle;
}

/* FEATURES */
#features{
  position:relative;z-index:10;
  padding:100px 60px;
}
.features-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:1px;margin-top:60px;
  background:var(--border);border:1px solid var(--border);
}
.feat-card{
  background:var(--bg);padding:40px;
  transition:background 0.3s;position:relative;overflow:hidden;
}
.feat-card:hover{background:var(--surface);}
.feat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  transform:scaleX(0);transition:transform 0.4s;
}
.feat-card:hover::before{transform:scaleX(1);}
.feat-num{
  font-family:'Bebas Neue',sans-serif;font-size:64px;
  color:rgba(0,255,200,0.08);line-height:1;margin-bottom:16px;
}
.feat-icon{font-size:28px;margin-bottom:16px;}
.feat-title{
  font-size:20px;font-weight:700;color:var(--white);
  margin-bottom:10px;letter-spacing:0.5px;
}
.feat-desc{font-size:14px;color:var(--muted);line-height:1.7;}

/* PRICING */
#pricing{
  position:relative;z-index:10;
  padding:100px 60px;text-align:center;
}
.pricing-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:24px;max-width:1000px;margin:60px auto 0;
}
.price-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;padding:40px 32px;
  position:relative;transition:transform 0.3s,box-shadow 0.3s;
}
.price-card:hover{transform:translateY(-8px);}
.price-card.popular{
  border-color:var(--cyan);
  box-shadow:0 0 40px rgba(0,255,200,0.12);
}
.popular-badge{
  position:absolute;top:-12px;left:50%;transform:translateX(-50%);
  background:var(--cyan);color:var(--bg);
  padding:4px 16px;border-radius:100px;
  font-family:'Space Mono',monospace;font-size:10px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
}
.price-name{
  font-family:'Bebas Neue',sans-serif;font-size:28px;
  letter-spacing:2px;color:var(--white);margin-bottom:8px;
}
.price-amount{
  font-family:'Bebas Neue',sans-serif;font-size:56px;
  color:var(--cyan);line-height:1;margin-bottom:4px;
}
.price-period{font-size:13px;color:var(--muted);margin-bottom:32px;}
.price-features{list-style:none;text-align:left;margin-bottom:32px;}
.price-features li{
  font-size:14px;color:var(--text);padding:8px 0;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.price-features li::before{content:'→';color:var(--cyan);font-family:'Space Mono',monospace;}
.price-btn{
  width:100%;padding:14px;border-radius:6px;
  font-family:'Space Mono',monospace;font-size:12px;
  font-weight:700;letter-spacing:1px;cursor:none;
  transition:all 0.2s;text-transform:uppercase;border:none;
}
.price-btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
.price-btn-outline:hover{border-color:var(--cyan);color:var(--cyan);}
.price-btn-solid{background:var(--cyan);color:var(--bg);}
.price-btn-solid:hover{box-shadow:0 0 30px var(--glow-c);}

/* AI BUILDER */
#builder{
  position:relative;z-index:10;
  padding:100px 60px;
}
.builder-wrapper{
  display:grid;grid-template-columns:340px 1fr;
  height:600px;margin-top:60px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
  box-shadow:0 0 100px rgba(0,0,0,0.8);
}
.builder-sidebar{
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;
}
.builder-sidebar-header{
  padding:20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.sidebar-title{
  font-family:'Space Mono',monospace;font-size:12px;
  color:var(--cyan);letter-spacing:1px;text-transform:uppercase;
}
.new-chat-btn{
  background:rgba(0,255,200,0.1);border:1px solid rgba(0,255,200,0.2);
  color:var(--cyan);padding:6px 14px;border-radius:4px;
  font-family:'Space Mono',monospace;font-size:10px;cursor:none;
  transition:all 0.2s;letter-spacing:1px;
}
.new-chat-btn:hover{background:rgba(0,255,200,0.2);}
.chips-area{
  padding:16px;display:flex;flex-wrap:wrap;gap:8px;
  border-bottom:1px solid var(--border);
}
.chip{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--muted);padding:6px 12px;border-radius:100px;
  font-size:11px;font-family:'Space Mono',monospace;
  cursor:none;transition:all 0.2s;
}
.chip:hover,.chip.active{
  background:rgba(0,255,200,0.1);border-color:var(--cyan);color:var(--cyan);
}
.chat-messages{
  flex:1;overflow-y:auto;padding:16px;
  display:flex;flex-direction:column;gap:12px;
}
.chat-messages::-webkit-scrollbar{width:3px;}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border);}
.msg{
  max-width:90%;font-size:13px;line-height:1.6;
  padding:12px 14px;border-radius:8px;
}
.msg-ai{
  background:rgba(0,255,200,0.06);border:1px solid rgba(0,255,200,0.12);
  color:var(--text);align-self:flex-start;border-radius:4px 12px 12px 12px;
}
.msg-user{
  background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.2);
  color:var(--text);align-self:flex-end;border-radius:12px 4px 12px 12px;
}
.msg-label{
  font-family:'Space Mono',monospace;font-size:9px;
  letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;
  opacity:0.5;
}
.chat-input-area{
  padding:16px;border-top:1px solid var(--border);
}
.chat-input-row{
  display:flex;gap:8px;align-items:center;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:8px 12px;
}
.chat-input{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--white);font-family:'JetBrains Mono',monospace;font-size:13px;
  resize:none;height:36px;
}
.chat-input::placeholder{color:var(--muted);}
.send-btn{
  background:var(--cyan);color:var(--bg);border:none;
  width:32px;height:32px;border-radius:4px;cursor:none;
  font-size:14px;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;flex-shrink:0;font-weight:700;
}
.send-btn:hover{box-shadow:0 0 15px var(--glow-c);}
.builder-main{
  display:flex;flex-direction:column;
}
.builder-toolbar{
  padding:12px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface2);
}
.toolbar-left{display:flex;align-items:center;gap:12px;}
.toolbar-tabs{display:flex;gap:0;background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.t-tab{
  padding:6px 16px;font-family:'Space Mono',monospace;font-size:11px;
  color:var(--muted);cursor:none;transition:all 0.2s;border:none;background:transparent;
}
.t-tab.active{background:var(--cyan);color:var(--bg);font-weight:700;}
.toolbar-right{display:flex;gap:8px;}
.tool-btn{
  background:var(--surface);border:1px solid var(--border);
  color:var(--muted);padding:6px 14px;border-radius:4px;
  font-family:'Space Mono',monospace;font-size:10px;cursor:none;
  transition:all 0.2s;letter-spacing:1px;
}
.tool-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.tool-btn.deploy{background:rgba(0,255,200,0.1);border-color:rgba(0,255,200,0.3);color:var(--cyan);}
.builder-preview{
  flex:1;background:#0a1628;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.preview-browser{
  width:85%;height:85%;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}
.browser-bar{
  background:var(--surface2);padding:10px 16px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);
}
.browser-dots{display:flex;gap:6px;}
.browser-dot{width:10px;height:10px;border-radius:50%;}
.url-bar{
  flex:1;background:var(--bg2);border:1px solid var(--border);
  padding:5px 12px;border-radius:4px;
  font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);
}
.preview-content{padding:24px;}
.preview-hero-demo{
  background:linear-gradient(135deg,#0d1b2a,#0a1628);
  border:1px solid var(--border);border-radius:8px;padding:24px;
  text-align:center;
}
.preview-hero-title{
  font-family:'Bebas Neue',sans-serif;font-size:32px;
  background:linear-gradient(90deg,var(--cyan),var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:8px;
}
.preview-hero-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.preview-cta{
  background:var(--cyan);color:var(--bg);
  padding:8px 20px;border-radius:4px;font-size:11px;
  font-family:'Space Mono',monospace;display:inline-block;
}
.preview-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px;}
.p-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;padding:14px;text-align:left;
}
.p-card-icon{font-size:18px;margin-bottom:6px;}
.p-card-title{font-size:11px;color:var(--white);font-weight:600;margin-bottom:3px;}
.p-card-desc{font-size:10px;color:var(--muted);}

/* STATS */
#stats{
  position:relative;z-index:10;
  padding:80px 60px;
  background:var(--surface);border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:40px;text-align:center;}
.stat-num{
  font-family:'Bebas Neue',sans-serif;font-size:64px;
  background:linear-gradient(135deg,var(--cyan),var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1;
}
.stat-label{font-size:13px;color:var(--muted);margin-top:8px;letter-spacing:1px;text-transform:uppercase;}

/* FOOTER */
footer{
  position:relative;z-index:10;
  padding:60px;
  border-top:1px solid var(--border);
}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:60px;}
.footer-brand .nav-logo{font-size:32px;}
.footer-tagline{font-size:13px;color:var(--muted);margin-top:12px;line-height:1.7;max-width:260px;}
.footer-col-title{
  font-family:'Space Mono',monospace;font-size:11px;
  letter-spacing:2px;color:var(--white);text-transform:uppercase;margin-bottom:20px;
}
.footer-links{list-style:none;display:flex;flex-direction:column;gap:12px;}
.footer-links a{color:var(--muted);text-decoration:none;font-size:14px;transition:color 0.2s;}
.footer-links a:hover{color:var(--cyan);}
.footer-bottom{
  margin-top:60px;padding-top:24px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.footer-copy{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);}
.footer-link{color:var(--cyan);text-decoration:none;}

/* SIGN PAGE */
#sign-overlay{
  position:fixed;inset:0;z-index:10000;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  animation:none;
}
.sign-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(0,255,200,0.08) 0%, transparent 60%),
